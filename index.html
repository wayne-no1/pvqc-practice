<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVQC 專業英文單字練習系統</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --container-bg: white;
            --text-color: #333;
            --heading-color: #333;
            --sub-heading: #555;
            --btn-bg: #007BFF;
            --btn-hover: #0056b3;
            --option-bg: #e9ecef;
            --option-hover: #d3d9df;
            --input-bg: white;
            --input-border: #ccc;
            --border-color: #ccc;
            --shadow-color: rgba(0,0,0,0.1);
        }

        body.dark-mode {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --heading-color: #ffffff;
            --sub-heading: #bbbbbb;
            --btn-bg: #1e88e5;
            --btn-hover: #1565c0;
            --option-bg: #2c2c2c;
            --option-hover: #3d3d3d;
            --input-bg: #2c2c2c;
            --input-border: #555;
            --border-color: #444;
            --shadow-color: rgba(0,0,0,0.5);
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin-top: 30px; background-color: var(--bg-color); color: var(--text-color); transition: background-color 0.3s, color 0.3s }
        .container { max-width: 800px; margin: 0 auto; padding: 30px; background-color: var(--container-bg); border-radius: 12px; box-shadow: 0 4px 15px var(--shadow-color); transition: background-color 0.3s; position: relative; }
        h1 { color: var(--heading-color); margin-bottom: 10px; }
        h3 { color: var(--sub-heading); margin-top: 30px; border-bottom: 2px solid var(--btn-bg); display: inline-block; padding-bottom: 5px; }
        .btn { display: inline-block; padding: 12px 24px; margin: 10px; font-size: 16px; cursor: pointer; border-radius: 8px; border: none; background-color: var(--btn-bg); color: white; transition: background-color 0.3s; }
        .btn:hover { background-color: var(--btn-hover); }
        .btn:disabled { background-color: var(--border-color); cursor: not-allowed; color: #666; }
        .option-btn { display: block; width: 80%; margin: 10px auto; padding: 15px; font-size: 18px; cursor: pointer; background-color: var(--option-bg); color: var(--text-color); border: 1px solid var(--border-color); border-radius: 8px; transition: background-color 0.2s; text-align: left; padding-left: 20px;}
        .option-btn:hover:not(:disabled) { background-color: var(--option-hover); }
        .hidden { display: none; }
        #question-area { font-size: 28px; margin-bottom: 25px; font-weight: bold; color: var(--heading-color); min-height: 40px; }
        input[type="text"] { font-size: 20px; padding: 10px; margin-bottom: 15px; width: 80%; border: 1px solid var(--input-border); border-radius: 5px; text-align: center; background-color: var(--input-bg); color: var(--text-color); }
        textarea { width: 90%; padding: 10px; font-size: 16px; border: 1px solid var(--input-border); border-radius: 5px; resize: vertical; background-color: var(--input-bg); color: var(--text-color); }
        #feedback { font-size: 20px; font-weight: bold; margin-top: 20px; min-height: 30px; }
        .sound-row { display: flex; justify-content: center; align-items: center; margin-bottom: 10px; }
        .sound-row .btn { margin: 0 5px; }
        .select-btn { background-color: #28a745; }
        .select-btn:hover { background-color: #218838; }
        body.dark-mode .select-btn { background-color: #2e7d32; }
        body.dark-mode .select-btn:hover { background-color: #1b5e20; }
        .home-btn { background-color: #6c757d; }
        .home-btn:hover { background-color: #5a6268; }
        body.dark-mode .home-btn { background-color: #5c6bc0; }
        body.dark-mode .home-btn:hover { background-color: #3f51b5; }
        .test-btn-group { display: flex; flex-wrap: wrap; justify-content: center; }
        .theme-toggle { position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-color); transition: transform 0.3s; padding: 5px; }
        .theme-toggle:hover { transform: scale(1.1); }
        .instruction-text { font-size: 14px; color: var(--sub-heading); text-align: left; padding: 0 5%; }
        /* 測驗結果表格樣式 */
        .results-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 16px; }
        .results-table th, .results-table td { border: 1px solid var(--border-color); padding: 12px; text-align: left; }
        .results-table th { background-color: var(--option-bg); color: var(--heading-color); }
        .result-correct { color: #28a745; font-weight: bold; }
        .result-wrong { color: #dc3545; font-weight: bold; }
        /* 歷史紀錄相關樣式 */
        .history-item { background-color: var(--option-bg); margin: 10px 0; padding: 15px; border-radius: 8px; text-align: left; cursor: pointer; transition: transform 0.2s; }
        .history-item:hover { transform: scale(1.01); background-color: var(--option-hover); }
        .history-meta { display: flex; justify-content: space-between; font-size: 14px; color: var(--sub-heading); margin-bottom: 5px; }
        .history-title { font-size: 18px; font-weight: bold; color: var(--heading-color); }
        .history-score { font-weight: bold; color: var(--btn-bg); }
        #history-list { max-height: 500px; overflow-y: auto; margin-top: 20px; }
        .preload-hint { color: #e67e22; font-weight: bold; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div class="container" id="home-view">
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="切換深色/淺色模式">🌙</button>
    <h1>PVQC 專業英文單字練習系統</h1>
    <h3>步驟 1：選擇或建立單字庫</h3>
    <div style="margin-bottom: 15px;">
        <select id="bank-select" onchange="loadSelectedBank()" style="font-size: 16px; padding: 5px; width: 40%; max-width: 250px;">
            <option value="">-- 建立新單字庫 --</option>
        </select>
        <button class="btn select-btn" onclick="saveBank()" style="padding: 6px 12px; margin: 0 5px; font-size: 14px;">儲存此單字庫</button>
        <button class="btn" style="background-color: #dc3545; padding: 6px 12px; margin: 0; font-size: 14px;" onclick="deleteBank()">刪除</button>
    </div>
    <input type="text" id="bank-title" placeholder="請輸入單字庫標題 (如：計算機單字庫)" style="width: 80%; font-size: 18px; padding: 10px; margin-bottom: 10px; border: 1px solid var(--input-border); border-radius: 5px; background-color: var(--input-bg); color: var(--text-color);">
    <p class="instruction-text">
        請在下方輸入您的單字清單，每一行一個單字，格式為「<strong>英文,中文</strong>」（可用半形或全形逗號）。
    </p>
    <div style="margin-bottom: 5px; display: flex; justify-content: space-between; align-items: flex-end; padding: 0 5%;">
        <span class="preload-hint">📢 系統已預設載入</span>
        <button class="btn" style="background-color: #f39c12; padding: 6px 12px; font-size: 14px; margin: 0;" onclick="autoFormat()">🪄 智慧修復格式</button>
    </div>
    <textarea id="vocab-input" rows="8" placeholder="正在從檔案載入預設單字..."></textarea>
    <h3>步驟 2：選擇測驗模式</h3>
    <div style="margin-bottom: 15px;">
        <label for="q-count" style="font-size: 18px; color: var(--text-color); font-weight: bold;">測驗題數 (最高 100 題)：</label>
        <input type="number" id="q-count" value="20" min="1" max="100" style="width: 70px; font-size: 18px; padding: 5px; text-align: center; border: 1px solid var(--input-border); border-radius: 5px; background-color: var(--input-bg); color: var(--text-color);">
    </div>
    <div style="text-align: left; display: inline-block; margin-bottom: 20px; font-size: 20px;">
        <div style="margin: 10px 0; display: flex; align-items: center;">
            <input type="checkbox" class="mode-check" value="1" id="m1" style="width: 20px; height: 20px; margin-right: 10px;"> 
            <label for="m1">測驗一：看中文 拼英文</label>
        </div>
        <div style="margin: 10px 0; display: flex; align-items: center;">
            <input type="checkbox" class="mode-check" value="2" id="m2" style="width: 20px; height: 20px; margin-right: 10px;"> 
            <label for="m2">測驗二：聽英文 選中文</label>
        </div>
        <div style="margin: 10px 0; display: flex; align-items: center;">
            <input type="checkbox" class="mode-check" value="3" id="m3" style="width: 20px; height: 20px; margin-right: 10px;"> 
            <label for="m3">測驗三：看英文 選中文</label>
        </div>
        <div style="margin: 10px 0; display: flex; align-items: center;">
            <input type="checkbox" class="mode-check" value="4" id="m4" style="width: 20px; height: 20px; margin-right: 10px;"> 
            <label for="m4">測驗四：聽英文 選英文</label>
        </div>
        <div style="margin: 10px 0; display: flex; align-items: center;">
            <input type="checkbox" class="mode-check" value="5" id="m5" style="width: 20px; height: 20px; margin-right: 10px;"> 
            <label for="m5">測驗五：看中文 選英文發音</label>
        </div>
        <div style="margin: 10px 0; display: flex; align-items: center;">
            <input type="checkbox" class="mode-check" value="6" id="m6" style="width: 20px; height: 20px; margin-right: 10px;"> 
            <label for="m6">測驗六：看英文 選英文發音</label>
        </div>
    </div>
    <div class="test-btn-group">
        <button class="btn select-btn" onclick="startSelectedModes()" style="width: 80%; font-size: 20px; font-weight: bold;">🚀 開始勾選的練習 (每項 15 分鐘)</button>
    </div>
        <br>
        <button class="btn home-btn" onclick="showHistory()">📊 查看最近 10 次紀錄</button>
</div>

<div class="container hidden" id="history-view">
    <h1>測驗歷史紀錄</h1>
    <p class="instruction-text" style="text-align:center">點擊紀錄可查看詳細錯誤對照表</p>
    <div id="history-list"></div>
    <br>
    <button class="btn home-btn" onclick="goHome()">回到主頁</button>
</div>

<div class="container hidden" id="detail-view">
    <h1 id="detail-title">測驗詳情回顧</h1>
    <div id="detail-content"></div>
    <br>
    <button class="btn home-btn" onclick="showHistory()">返回歷史清單</button>
</div>

<div class="container hidden" id="test-view">
    <div id="timer" style="position: absolute; top: 10px; right: 20px; font-size: 24px; font-weight: bold; color: #dc3545;"></div>
    <h2 id="test-title" style="color: var(--sub-heading); margin-top: 20px;"></h2>
    <div id="question-area"></div>
    <div id="input-area"></div>
    <div id="feedback"></div>
    <button class="btn" onclick="nextQuestion()" id="next-btn" style="background-color: #6c757d; margin-top: 20px;">跳過此題</button>
    <p style="font-size: 18px; margin-top: 20px;">得分: <span id="score">0</span> / <span id="total-questions">0</span></p>
    <br>
    <button class="btn home-btn" onclick="goHome()">回到主頁</button>
</div>

<script>
    // 預設單字庫檔案路徑定義
    const BUILTIN_FILES = {
        "專業英文 (PVQC)": "banks/PVQC.txt",
        "計算機組織與設計": "banks/計算機組織與設計.txt"
    };

    let vocab = [];
    let currentTestType = 0;
    let currentQuestionIndex = 0;
    let score = 0;
    let currentWord = null;
    let questions = [];
    let totalQ = 0;
    let testResults = []; 
    let modeQueue = []; 
    let timerInterval = null;
    let currentModeIndex = 0;

    window.onload = () => {
        // 主題初始化
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            const themeBtn = document.getElementById('theme-btn');
            if (themeBtn) themeBtn.innerText = '☀️';
        }
        
        // 渲染下拉選單
        refreshBankSelect();
        
        // 預設選取第一個並載入
        const select = document.getElementById('bank-select');
        if (select && select.options.length > 1) {
            select.value = "專業英文 (PVQC)";
            loadSelectedBank();
        }
    };

    function refreshBankSelect() {
        console.log("正在重新整理選單...");
        const banks = JSON.parse(localStorage.getItem('pvqc_banks') || '{}');
        const select = document.getElementById('bank-select');
        if (!select) return;

        select.innerHTML = '<option value="">-- 建立新單字庫 --</option>';
        
        // 1. 插入預設檔案選項
        for (let title in BUILTIN_FILES) {
            let opt = document.createElement('option');
            opt.value = title;
            opt.innerText = "預設：" + title;
            opt.style.fontWeight = "bold";
            opt.style.color = "#007BFF";
            select.appendChild(opt);
        }

        // 2. 插入使用者儲存的選項
        for (let title in banks) {
            let opt = document.createElement('option');
            opt.value = title;
            opt.innerText = title;
            select.appendChild(opt);
        }
        console.log("選單整理完成。");
    }

    async function loadSelectedBank() {
        const title = document.getElementById('bank-select').value;
        const titleInput = document.getElementById('bank-title');
        const vocabInput = document.getElementById('vocab-input');
        
        if (title === "") {
            titleInput.value = "";
            vocabInput.value = "";
        } else if (BUILTIN_FILES[title]) {
            titleInput.value = title;
            vocabInput.value = "載入中...";
            try {
                // 為了處理本地 file:// 開啟的問題，加入快取防止
                const response = await fetch(BUILTIN_FILES[title] + "?t=" + Date.now());
                if (!response.ok) throw new Error('無法讀取單字檔');
                const text = await response.text();
                vocabInput.value = text;
            } catch (err) {
                console.error(err);
                vocabInput.value = "載入失敗！\n原因：瀏覽器限制讀取本地檔案。\n解決方法：請使用 VS Code 的 Live Server 開啟，或將檔案上傳至網頁空間。";
            }
        } else {
            const banks = JSON.parse(localStorage.getItem('pvqc_banks') || '{}');
            titleInput.value = title;
            if (banks[title]) {
                vocabInput.value = banks[title];
            }
        }
    }

    function startSelectedModes() {
        const checked = Array.from(document.querySelectorAll('.mode-check:checked')).map(el => parseInt(el.value));
        if (checked.length === 0) {
            alert("請至少勾選一個測驗模式！");
            return;
        }
        
        let parsedVocab = parseVocab();
        if (parsedVocab.length < 4) {
            alert(`單字量不足！目前的格式解析出 ${parsedVocab.length} 個單字，請確保每行格式為「英文,中文」，且至少輸入 4 組。`);
            return;
        }
        
        modeQueue = checked.map(v => parseInt(v));
        currentModeIndex = 0;
        startNextModeInQueue();
    }

    function startNextModeInQueue() {
        if (currentModeIndex >= modeQueue.length) {
            return; 
        }
        startTest(modeQueue[currentModeIndex]);
        startTimer(15 * 60); 
    }

    function startTimer(seconds) {
        if (timerInterval) clearInterval(timerInterval);
        const timerDisplay = document.getElementById('timer');
        
        function updateTimerDisplay(s) {
            const mins = Math.floor(s / 60);
            const secs = s % 60;
            timerDisplay.innerText = `⏳ ${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        updateTimerDisplay(seconds);
        
        timerInterval = setInterval(() => {
            seconds--;
            if (seconds < 0) {
                clearInterval(timerInterval);
                alert("15 分鐘時間到！即將切換模式。");
                currentModeIndex++;
                if (currentModeIndex < modeQueue.length) {
                    startNextModeInQueue();
                } else {
                    currentQuestionIndex = totalQ; 
                    loadQuestion();
                }
                return;
            }
            updateTimerDisplay(seconds);
        }, 1000);
    }

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        document.getElementById('theme-btn').innerText = isDark ? '☀️' : '🌙';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    function saveBank() {
        const title = document.getElementById('bank-title').value.trim();
        const content = document.getElementById('vocab-input').value.trim();
        if (!title) {
            alert('請輸入單字庫標題！');
            return;
        }
        if (!content) {
            alert('請輸入單字內容！');
            return;
        }
        const banks = JSON.parse(localStorage.getItem('pvqc_banks') || '{}');
        banks[title] = content;
        localStorage.setItem('pvqc_banks', JSON.stringify(banks));
        alert('單字庫「' + title + '」已儲存！');
        refreshBankSelect();
        document.getElementById('bank-select').value = title;
    }

    function deleteBank() {
        const select = document.getElementById('bank-select');
        const title = select.value;
        if (!title) {
            alert('請先選擇要刪除的單字庫！');
            return;
        }
        if (BUILTIN_FILES[title]) {
            alert('預設單字庫無法刪除！');
            return;
        }
        if (confirm('確定要刪除單字庫「' + title + '」嗎？')) {
            const banks = JSON.parse(localStorage.getItem('pvqc_banks') || '{}');
            delete banks[title];
            localStorage.setItem('pvqc_banks', JSON.stringify(banks));
            refreshBankSelect();
            loadSelectedBank();
        }
    }

    function autoFormat() {
        const text = document.getElementById('vocab-input').value.trim();
        if (!text) return;
        const parsed = parseVocab();
        if (parsed.length === 0) {
            alert("無法辨識目前格式！請確保每行至少有一個空格或符號。");
            return;
        }
        const formatted = parsed.map(item => `${item.en}, ${item.zh}`).join('\n');
        document.getElementById('vocab-input').value = formatted;
        alert(`已成功辨識並修復 ${parsed.length} 個單字！`);
    }

    function parseVocab() {
        const text = document.getElementById('vocab-input').value.trim();
        if (!text) return [];
        const lines = text.split('\n');
        let newVocab = [];
        for (let line of lines) {
            let originalLine = line.trim();
            if (!originalLine) continue;
            
            let en = "", zh = "";
            let parts = originalLine.split(/[,，;:：;\t\-|\/]| {2,}/);
            if (parts.length >= 2) {
                en = parts[0].trim();
                zh = parts.slice(1).join(',').trim();
            } else {
                const cjkMatch = originalLine.match(/[\u4e00-\u9fa5]/);
                if (cjkMatch) {
                    const index = cjkMatch.index;
                    en = originalLine.substring(0, index).trim();
                    zh = originalLine.substring(index).trim();
                } else {
                    let spaceParts = originalLine.split(/\s+/);
                    if (spaceParts.length >= 2) {
                        en = spaceParts[0].trim();
                        zh = spaceParts.slice(1).join(' ').trim();
                    }
                }
            }
            
            if (en && zh) {
                newVocab.push({ en: en, zh: zh });
            }
        }
        return newVocab;
    }

    function speak(text) {
        if ('speechSynthesis' in window) {
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            speechSynthesis.speak(utterance);
        }
    }

    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function getRandomOptions(correctWord, key) {
        let options = [correctWord[key]];
        let tempVocab = [...vocab].filter(w => w[key] !== correctWord[key]);
        shuffle(tempVocab);
        for(let i=0; i < 3 && i < tempVocab.length; i++) {
            if(!options.includes(tempVocab[i][key])) options.push(tempVocab[i][key]);
        }
        return shuffle(options);
    }

    function startTest(type) {
        let parsedVocab = parseVocab();
        if (parsedVocab.length < 4) {
            alert("請在文字框內至少輸入 4 組單字，以便產生足夠的選擇題選項！");
            return;
        }
        
        let maxQ = parseInt(document.getElementById('q-count').value, 10);
        if (isNaN(maxQ) || maxQ < 1) maxQ = 20;
        if (maxQ > 100) maxQ = 100;
        
        vocab = parsedVocab;
        currentTestType = type;
        score = 0;
        currentQuestionIndex = 0;
        testResults = [];
        
        let titles = [
            "",
            "測驗一：看中文 拼英文",
            "測驗二：聽英文 選中文",
            "測驗三：看英文 選中文",
            "測驗四：聽聲音 選英文",
            "測驗五：看中文 選發音",
            "測驗六：看英文 選發音"
        ];
        document.getElementById('test-title').innerText = titles[type];
        
        questions = shuffle([...vocab]);
        if (questions.length > maxQ) {
            questions = questions.slice(0, maxQ);
        }
        totalQ = questions.length;
        
        document.getElementById('home-view').classList.add('hidden');
        document.getElementById('test-view').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQuestionIndex >= totalQ) {
            if (modeQueue.length > 0 && currentModeIndex < modeQueue.length - 1) {
                currentModeIndex++;
                startNextModeInQueue();
                return;
            }
            
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('timer').innerText = "";
            
            document.getElementById('question-area').innerText = "測驗全部結束！";
            document.getElementById('next-btn').classList.add('hidden');
            
            let finalColor = document.body.classList.contains('dark-mode') ? '#64b5f6' : 'blue';
            let html = `<h3 style="color: ${finalColor};">總得分：${score} / ${totalQ}</h3>`;
            
            html += `<table class="results-table">
                        <thead>
                            <tr>
                                <th>題目</th>
                                <th>您的答案</th>
                                <th>正確答案</th>
                                <th>結果</th>
                            </tr>
                        </thead>
                        <tbody>`;
            
            testResults.forEach(res => {
                const statusClass = res.isCorrect ? 'result-correct' : 'result-wrong';
                const statusText = res.isCorrect ? '✅' : '❌';
                html += `<tr>
                            <td>${res.qText}</td>
                            <td>${res.userAns}</td>
                            <td>${res.correctAns}</td>
                            <td class="${statusClass}">${statusText}</td>
                         </tr>`;
            });
            
            html += `</tbody></table>`;
            document.getElementById('input-area').innerHTML = html;
            document.getElementById('feedback').innerHTML = "";
            
            saveHistory({
                title: document.getElementById('test-title').innerText,
                score: score,
                total: totalQ,
                results: testResults,
                time: new Date().toLocaleString()
            });
            return;
        }
        currentWord = questions[currentQuestionIndex];
        document.getElementById('question-area').innerHTML = "";
        document.getElementById('input-area').innerHTML = "";
        document.getElementById('feedback').innerText = "";
        
        const nextBtn = document.getElementById('next-btn');
        nextBtn.innerText = "跳過此題";
        nextBtn.style.backgroundColor = "#6c757d";
        nextBtn.classList.remove('hidden');

        document.getElementById('score').innerText = score;
        document.getElementById('total-questions').innerText = totalQ;

        if (currentTestType === 1) {
            document.getElementById('question-area').innerText = currentWord.zh;
            document.getElementById('input-area').innerHTML = `
                <div id="char-hint" style="font-size: 16px; color: var(--sub-heading); margin-bottom: 5px; font-weight: normal;"></div>
                <input type="text" id="ans-input" placeholder="請輸入英文單字" oninput="updateCharHint()" onkeypress="handleEnter(event)" autocomplete="off">
                <br>
                <button class="btn select-btn" onclick="checkAnswer1()">送出答案</button>
            `;
            updateCharHint();
            setTimeout(() => document.getElementById('ans-input').focus(), 100);
        } else if (currentTestType === 2) {
            document.getElementById('question-area').innerHTML = `<button class="btn" id="play-btn" style="font-size: 24px;">🔊 播放英文</button>`;
            document.getElementById('play-btn').onclick = () => speak(currentWord.en);
            speak(currentWord.en);
            buildOptions(getRandomOptions(currentWord, 'zh'), currentWord.zh);
        } else if (currentTestType === 3) {
            document.getElementById('question-area').innerText = currentWord.en;
            buildOptions(getRandomOptions(currentWord, 'zh'), currentWord.zh);
        } else if (currentTestType === 4) {
            document.getElementById('question-area').innerHTML = `<button class="btn" id="play-btn" style="font-size: 24px;">🔊 播放單字</button>`;
            document.getElementById('play-btn').onclick = () => speak(currentWord.en);
            speak(currentWord.en);
            buildOptions(getRandomOptions(currentWord, 'en'), currentWord.en);
        } else if ([5, 6].includes(currentTestType)) {
            document.getElementById('question-area').innerText = currentTestType === 5 ? currentWord.zh : currentWord.en;
            buildSoundOptions(currentWord);
        }
    }

    function handleEnter(e) { 
        if(e.key === 'Enter') {
            const nextBtn = document.getElementById('next-btn');
            if (nextBtn.innerText === "下一題") {
                nextQuestion();
            } else {
                checkAnswer1();
            }
        }
    }
    
    function updateCharHint() {
        const input = document.getElementById('ans-input');
        const hint = document.getElementById('char-hint');
        if (!input || !hint || !currentWord) return;
        
        const targetLen = currentWord.en.length;
        const currentLen = input.value.length;
        const remaining = targetLen - currentLen;
        
        if (remaining > 0) {
            hint.innerText = `剩餘 ${remaining} 個字元 (總長度: ${targetLen})`;
            hint.style.color = "var(--sub-heading)";
        } else if (remaining === 0) {
            hint.innerText = `字數符合！ (總長度: ${targetLen})`;
            hint.style.color = "#28a745";
        } else {
            hint.innerText = `超出 ${Math.abs(remaining)} 個字元 (總長度: ${targetLen})`;
            hint.style.color = "#dc3545";
        }
    }

    function checkAnswer1() {
        let input = document.getElementById('ans-input').value.trim();
        if(input === "") return;
        showFeedback(input.toLowerCase() === currentWord.en.toLowerCase(), currentWord.en, input);
    }

    function buildOptions(options, correctAns) {
        options.forEach(opt => {
            let btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => showFeedback(opt === correctAns, correctAns, opt);
            document.getElementById('input-area').appendChild(btn);
        });
    }

    function buildSoundOptions(correctWord) {
        let options = [correctWord.en];
        let tempVocab = [...vocab].filter(w => w.en !== correctWord.en);
        shuffle(tempVocab);
        for(let i=0; i < 3 && i < tempVocab.length; i++) options.push(tempVocab[i].en);
        shuffle(options);
        options.forEach((opt, index) => {
            let row = document.createElement('div');
            row.className = 'sound-row';
            
            let playBtn = document.createElement('button');
            playBtn.className = 'btn';
            playBtn.innerText = `🔊 選項 ${index + 1}`;
            playBtn.onclick = () => speak(opt);
            
            let selectBtn = document.createElement('button');
            selectBtn.className = 'btn select-btn';
            selectBtn.innerText = `選擇此選項`;
            selectBtn.onclick = () => showFeedback(opt === correctWord.en, correctWord.en, `選項 ${index + 1}`);
            
            row.appendChild(playBtn);
            row.appendChild(selectBtn);
            document.getElementById('input-area').appendChild(row);
        });
    }

    function showFeedback(isCorrect, correctAnsText, userAnsText) {
        let f = document.getElementById('feedback');
        let isDark = document.body.classList.contains('dark-mode');
        f.innerText = isCorrect ? "✅ 正確！" : `❌ 錯誤！正確答案是：${correctAnsText}`;
        f.style.color = isCorrect ? (isDark ? "#4caf50" : "#28a745") : (isDark ? "#f44336" : "#dc3545");
        
        let qText = "";
        if ([1, 5].includes(currentTestType)) qText = currentWord.zh;
        else if ([3, 6].includes(currentTestType)) qText = currentWord.en;
        else if (currentTestType === 2) qText = "🔊 (聽音選中)";
        else if (currentTestType === 4) qText = "🔊 (聽音選英)";

        testResults.push({
            qText: qText,
            userAns: userAnsText || "(未填寫)",
            correctAns: correctAnsText,
            isCorrect: isCorrect
        });

        if (isCorrect) score++;
        document.getElementById('score').innerText = score;
        document.querySelectorAll('#input-area input, #input-area button').forEach(el => el.disabled = true);
        
        const nextBtn = document.getElementById('next-btn');
        nextBtn.innerText = "下一題";
        nextBtn.style.backgroundColor = "#17a2b8";
    }

    function nextQuestion() { 
        if (testResults.length <= currentQuestionIndex) {
            let qText = "";
            if ([1, 5].includes(currentTestType)) qText = currentWord.zh;
            else if ([3, 6].includes(currentTestType)) qText = currentWord.en;
            else if (currentTestType === 2) qText = "🔊 (聽音選中)";
            else if (currentTestType === 4) qText = "🔊 (聽音選英)";

            let correctAns = ([1, 4, 5, 6].includes(currentTestType)) ? currentWord.en : currentWord.zh;

            testResults.push({
                qText: qText,
                userAns: "<span style='color:gray'>已跳過</span>",
                correctAns: correctAns,
                isCorrect: false
            });
        }
        currentQuestionIndex++; 
        loadQuestion(); 
    }

    function goHome() {
        if (timerInterval) clearInterval(timerInterval);
        document.getElementById('timer').innerText = "";
        document.getElementById('test-view').classList.add('hidden');
        document.getElementById('history-view').classList.add('hidden');
        document.getElementById('detail-view').classList.add('hidden');
        document.getElementById('home-view').classList.remove('hidden');
        if ('speechSynthesis' in window) speechSynthesis.cancel();
    }

    function saveHistory(session) {
        let history = JSON.parse(localStorage.getItem('pvqc_history') || '[]');
        history.unshift(session);
        if (history.length > 10) history = history.slice(0, 10);
        localStorage.setItem('pvqc_history', JSON.stringify(history));
    }

    function showHistory() {
        if (timerInterval) clearInterval(timerInterval);
        document.getElementById('timer').innerText = "";
        document.getElementById('home-view').classList.add('hidden');
        document.getElementById('detail-view').classList.add('hidden');
        document.getElementById('test-view').classList.add('hidden');
        document.getElementById('history-view').classList.remove('hidden');
        
        const history = JSON.parse(localStorage.getItem('pvqc_history') || '[]');
        const list = document.getElementById('history-list');
        
        if (history.length === 0) {
            list.innerHTML = "<p style='margin-top:20px'>尚無測驗紀錄</p>";
            return;
        }

        list.innerHTML = history.map((h, index) => `
            <div class="history-item" onclick="showDetail(${index})">
                <div class="history-meta">
                    <span>${h.time}</span>
                    <span class="history-score">得分: ${h.score}/${h.total}</span>
                </div>
                <div class="history-title">${h.title}</div>
            </div>
        `).join('');
    }

    function showDetail(index) {
        const history = JSON.parse(localStorage.getItem('pvqc_history') || '[]');
        const record = history[index];
        if (!record) return;

        document.getElementById('history-view').classList.add('hidden');
        document.getElementById('detail-view').classList.remove('hidden');
        
        let html = `<h3 style="margin-bottom:20px">${record.time} - 得分: ${record.score}/${record.total}</h3>`;
        html += `<table class="results-table">
                    <thead>
                        <tr>
                            <th>題目</th>
                            <th>您的答案</th>
                            <th>正確答案</th>
                            <th>結果</th>
                        </tr>
                    </thead>
                    <tbody>`;
        
        record.results.forEach(res => {
            const statusClass = res.isCorrect ? 'result-correct' : 'result-wrong';
            const statusText = res.isCorrect ? '✅' : '❌';
            html += `<tr>
                        <td>${res.qText}</td>
                        <td>${res.userAns}</td>
                        <td>${res.correctAns}</td>
                        <td class="${statusClass}">${statusText}</td>
                     </tr>`;
        });
        
        html += `</tbody></table>`;
        document.getElementById('detail-content').innerHTML = html;
    }
</script>
</body>
</html>
